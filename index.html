    <script type="text/javascript">
      function createSwitchAnimation() {
        let fromDiv,
            timerID;

        fromDiv = document.createElement("div");
        document.body.appendChild(fromDiv);

        return function animateSwitch(fromElem, targetBoundingRect) {
          fromDiv.className = "";

          Object.values(fromElem.style)
            .filter((v) => !(v in ["height", "width", "position"]))
            .forEach((key) => {
              let value = fromElem.style[key];
              fromDiv.style[key] = value;
            });

          const bounds = fromElem.getBoundingClientRect();
          fromDiv.style.width = bounds.width + "px";
          fromDiv.style.height = bounds.height + "px";
          fromDiv.style.top = bounds.top + "px";
          fromDiv.style.left = bounds.left + "px";
          
          clearTimeout(timerID);
          timerID = setTimeout(() => {
            fromDiv.className = "switch";

            const bounds = targetBoundingRect;
            fromDiv.style.width = bounds.width + "px";
            fromDiv.style.height = bounds.height + "px";
            fromDiv.style.top = bounds.top + "px";
            fromDiv.style.left = bounds.left + "px";
          }, 10);
        }
      }

      const animateSwitchFrom = createSwitchAnimation();
      const animateSwitchTo = createSwitchAnimation();

      const player = new PlayerRenderer();
      window.player = player;

      const ROWS = 8;
      const COLUMNS = 12;
      const OPTIMIZABLE = ["buildRate", "expBonus", "flaggy"];
      const WEIGHT_PRESETS = {
        longterm: { buildRate: 3, expBonus: 90, flaggy: 7 },
        flaggy:   { buildRate: 3, expBonus: 47, flaggy: 50 }
      };

      const getInput = (id) => Number.parseInt(document.getElementById(id).value);

      function getWeightPriorities() {
        const preset = document.getElementById("weightPreset").value;
        if (preset !== "custom" && WEIGHT_PRESETS[preset]) {
          return WEIGHT_PRESETS[preset];
        }
        return {
          buildRate: getInput("buildRate"),
          expBonus: getInput("expBonus"),
          flaggy: getInput("flaggy")
        };
      }

      // Convert user-facing priority percentages to solver weights
      // normalized by effective score contributions (including boost multipliers)
      function prioritiesToWeights(priorities, score, playerCount, flagCount) {
        const br = Math.abs(score.buildRate) || 1;
        const xpBoost = (score.expBoost + playerCount) / playerCount;
        const flBoost = (score.flagBoost + flagCount) / flagCount;
        const xp = (Math.abs(score.expBonus) || 1) * xpBoost;
        const fl = (Math.abs(score.flaggy) || 1) * flBoost;
        return {
          buildRate: priorities.buildRate / br,
          expBonus: priorities.expBonus / xp,
          flaggy: priorities.flaggy / fl
        };
      }
      const getFlaggyShop = getInput.bind(null, "flaggyShop");

      const createElem = function createElem(tagName, style=undefined) {
        const elem = document.createElement(tagName);
        if (style) {
          elem.style = style;
        }
        return elem;
      }
      
      window.g = {
        cogs: {},
        board: [],
        best: null
      };
      window.f = {};

      window.boardRenderer = new BoardRenderer(ROWS, COLUMNS, "board");
      window.spareRenderer = new BoardRenderer(60, 3, "spare", 5);
      window.solver = new Solver();
      window.cogInvetory = new CogInventory();

      window.sparePage = new Paginator("sparepage", window.spareRenderer._pageCount, 1);
      window.sparePage.addEventListener("change", (ev) => {
        window.spareRenderer.showPage(ev.page);
      });

      const boardElem = document.getElementById("currentBoard");
      boardElem.innerHTML = "";
      // boardElem.appendChild(table);
      boardElem.appendChild(window.boardRenderer.createHTMLElement());

      const stepContainer = createElem("div");
      stepContainer.id = "stepspage";
      boardElem.appendChild(stepContainer);
      const stepsPage = new Paginator("stepspage", 0, 0, "Step");
      stepsPage.addEventListener("change", stepsChangeHandler);

      window.addEventListener("keyup", (ev) => {
        if (ev.key == "ArrowLeft") {
          stepsPage.prev(ev);
        } else if (ev.key == "ArrowRight") {
          stepsPage.next(ev);
        }
      }, true);

      const spareElem = document.getElementById("spare");
      const spareParent = spareElem.parentNode;
      spareParent.insertBefore(window.spareRenderer.createHTMLElement(), spareElem);
      spareParent.removeChild(spareElem);

      const settingsBtn = document.getElementById("settingsbtn");
      const slider = settingsBtn.childNodes[3].childNodes[1];
      const settingsPage = document.getElementById("settings");
      const borderElem = document.getElementById("border");
      settingsBtn.addEventListener("click", () => {
        const active = slider.classList.contains("active");
        if (active) {
          slider.classList.remove("active");
          settingsPage.style.display = "none";
        } else {
          openCogTab();

          slider.classList.add("active");
          settingsPage.style.display = "";
        }
      })

      // Preset selector logic
      const weightPresetSelect = document.getElementById("weightPreset");
      const customWeightsDiv = document.getElementById("customWeights");
      weightPresetSelect.addEventListener("change", () => {
        const isCustom = weightPresetSelect.value === "custom";
        customWeightsDiv.style.display = isCustom ? "" : "none";
        if (!isCustom && WEIGHT_PRESETS[weightPresetSelect.value]) {
          const p = WEIGHT_PRESETS[weightPresetSelect.value];
          document.getElementById("buildRate").value = p.buildRate;
          document.getElementById("expBonus").value = p.expBonus;
          document.getElementById("flaggy").value = p.flaggy;
        }
      });

      f.verifyBoardIntegrity = (board) => {
        for (let y = 0; y < board.length; y++) {
          for (let x = 0; x < board[y].length; x++) {
            if (board[y][x].blocked) continue;
            const tempPos = board[y][x].position();
            if (tempPos.x !== x || tempPos.y !== y) {
              debugger;
            }
          }
        }
      }
      
      f.printBoard = (board, cord1={},cord2={}) => {
        for (let i = 0; i < board.length; i++) {
          const row = createElem("tr");
          
          for (let j = 0; j < board[i].length; j++) {
            window.boardRenderer.set(i, j, board[i][j]);
          }
        }

        console.log("Board updated");
      }
      
      function yield() {
        return new Promise(r=>setTimeout(r,1));
      }
      
      f.printMove = (stepNumber, board, cog1, cog2, pos1, pos2, showStats = false) => {
        const toAdd = createElem("p");

        let text = `Switch ${pos1.location} \
        [${pos1.x + 1}|${pos1.y + 1}]`;
        if (showStats) {
          text += ` (${cog1.buildRate || 0}:${cog1.expBonus || 0}:${cog1.flaggy || 0})`;
        }
        text += ` <span style="background-image: url('${cog1.icon.path}')"></span> with ${pos2.location} [${pos2.x + 1}|${pos2.y + 1}]`;
        if (showStats) {
          text += ` (${cog2.buildRate || 0}:${cog2.expBonus || 0}:${cog2.flaggy || 0})`;
        }
        text += ` <span style="background-image: url('${cog2.icon.path}')"></span>`;

        toAdd.innerHTML = text;

        toAdd.onclick = () => {
          stepsPage.goto(stepNumber);
        }
        document.getElementById("steps").appendChild(toAdd);
      }
      
      f.getOptimalSteps = (board, cogs) => {
        const steps = [];
        
        const cogsToMove = Object.values(cogs)
          .map(c=>{return new Cog(c)})
          .filter((c) => c.key !== c.initialKey);

        const interimCogs = {};
        for (const cog of cogsToMove) {
          interimCogs[cog.initialKey] = cog;
        }

        // Multi-step movements
        let tuple;
        while (tuple = Object.entries(interimCogs)[0]) {
          const [key, cog] = tuple;
          const targetCog = interimCogs[cog.key] || { icon: "Blank", key, position: cog.position.bind(cog) };
          if (targetCog === cog) {
            delete interimCogs[key];
            continue;
          }
          interimCogs[key] = targetCog;
          steps.push({
            board,
            cog,
            targetCog,
            keyFrom: Number.parseInt(key),
            keyTo: Number.parseInt(cog.key)
          });
          delete interimCogs[cog.key];
        }

        return steps;
      }

      f.printOptimalSteps = (steps) => {
        document.getElementById("steps").innerHTML = "";
        const showStats = document.getElementById("showStats").checked;

        for (let i = 0; i < steps.length; i++) {
          const step = steps[i];
          f.printMove(
            i,
            step.board,
            step.cog,
            step.targetCog,
            step.cog.position(step.keyFrom),
            step.targetCog.position(step.keyTo),
            showStats);
        }
      }

      function mmoifyNumber(num, addSign = true) {
        let str = num;

        const abs = Math.abs(num);

        if (abs >= 1_000_000_000_000) {
            str = (Math.ceil(num / 10_000_000_000) / 100) + "T";
        } else if (abs >= 1_000_000_000) {
            str = (Math.ceil(num / 10_000_000) / 100) + "B";
        } else if (abs >= 1_000_000) {
            str = (Math.ceil(num / 10_000) / 100) + "M";
        } else if (abs >= 1000) {
            str = (Math.ceil(num / 10) / 100) + "K";
        }

        if (addSign && num >= 0) {
          str = "+" + str;
        }

        return str.toString();
      }

      function load(save) {
        cogInvetory.load(save);
        window.originalCogInventory = cogInvetory.clone();
        console.log("Loading");
        // Fetch Gem-Shop flaggy upgrades
        document.getElementById("flaggyShop").value = cogInvetory.flaggyShopUpgrades;
        // Compute actual spare page count from save data
        const spareRows = Math.ceil((cogInvetory.spareSlotCount || 0) / 3);
        const sparePages = Math.ceil(spareRows / 5) || 1;
        sparePage.reset(sparePages, 0);
        // Render all spare cogs (108+) including tiny cogs at 228+
        const spareCogKeys = Object.keys(cogInvetory.cogs)
          .map(Number)
          .filter(k => k >= 108)
          .sort((a, b) => a - b);
        for (const i of spareCogKeys) {
          const index = (i - 108);
          const row = Math.floor(index / 3);
          const col = index % 3;
          window.spareRenderer.set(row, col, cogInvetory.cogs[i]);
        }

        const initScore = cogInvetory.score;
        f.printBoard(cogInvetory.board);

        // Render tiny cog columns (keys 228-251: left 228-239, right 240-251)
        const tinyLeft = document.getElementById("tinycogs-left");
        const tinyRight = document.getElementById("tinycogs-right");
        tinyLeft.innerHTML = "";
        tinyRight.innerHTML = "";
        const TINY_LEFT_START = 228, TINY_RIGHT_START = 240, TINY_PER_SIDE = 12;
        const hasTinyCogs = Object.keys(cogInvetory.cogs).some(k => Number(k) >= TINY_LEFT_START);
        if (hasTinyCogs) {
          tinyLeft.style.display = "flex";
          tinyRight.style.display = "flex";
          document.getElementById("currentBoard").style.borderRight = "none";
          const states = cogInvetory.tinyCogSlotStates || [];
          const makeCol = (container, start, stateOffset) => {
            for (let i = 0; i < TINY_PER_SIDE; i++) {
              const key = start + i;
              const cog = cogInvetory.cogs[key];
              const state = states[stateOffset + i] || {};
              const cell = createElem("div");
              cell.style.width = "30px";
              cell.style.height = "30px";
              cell.style.backgroundSize = "cover";
              cell.style.backgroundRepeat = "no-repeat";
              cell.style.border = "1px solid black";
              if (cog && cog.icon && cog.icon.type === "smallcog") {
                cell.style.backgroundImage = `url("${cog.icon.path}"), url("assets/cog_bg.png")`;
                cell.style.backgroundSize = "auto, cover";
                cell.style.backgroundPosition = "center, center";
                cell.style.backgroundRepeat = "no-repeat, no-repeat";
              } else if (state.hasFlag) {
                cell.style.backgroundImage = 'url("icons/cogs/flag.png")';
                cell.style.backgroundSize = "cover";
              } else if (!state.unlocked) {
                cell.style.backgroundImage = 'url("assets/cog_blank.png")';
                const lock = createElem("div");
                lock.className = "lock-icon lock-icon-sm";
                cell.appendChild(lock);
              } else {
                cell.style.backgroundImage = 'url("assets/cog_blank.png")';
              }
              container.appendChild(cell);
            }
          };
          makeCol(tinyLeft, TINY_LEFT_START, 0);
          makeCol(tinyRight, TINY_RIGHT_START, 12);
        } else {
          tinyLeft.style.display = "none";
          tinyRight.style.display = "none";
          document.getElementById("currentBoard").style.borderRight = "";
        }

        document.getElementById("solve").disabled = "";
        document.getElementById("steps").innerHTML = "";
        const xpMult = cogInvetory.tinyMultipliers ? cogInvetory.tinyMultipliers.expBonus : 1;
        document.getElementById("buildrate").innerText = mmoifyNumber(initScore.buildRate, false) + "/HR";
        document.getElementById("xpbonus").innerText = mmoifyNumber(initScore.expBonus * xpMult, false) + "%";
        document.getElementById("flaggyrate").innerText = mmoifyNumber(initScore.flaggy, false) + "/HR";
        
        for (let oneOption of [...OPTIMIZABLE, "solveTime", "solveIterations", "weightPreset"]) {
          const val = localStorage.getItem(oneOption);
          if (val) {
            document.getElementById(oneOption).value = val;
          }
        }
        // Sync custom weights visibility with stored preset
        customWeightsDiv.style.display = document.getElementById("weightPreset").value === "custom" ? "" : "none";

        // Auto-detect flaggy mode
        const hintElem = document.getElementById("presetHint");
        const presetSelect = document.getElementById("weightPreset");
        if (cogInvetory.flagPose.length === 0) {
          // No flags placed — flaggy is useless, solver will auto-zero it
          hintElem.innerText = "(no flags placed, flaggy disabled)";
          hintElem.style.color = "#999";
        } else if (cogInvetory.lockedSlotsRemaining > 0) {
          // Flags placed and slots to unlock — recommend flaggy push
          hintElem.innerText = `(${cogInvetory.lockedSlotsRemaining} slots to unlock — Flaggy Push recommended)`;
          hintElem.style.color = "#ffa18d";
          if (!localStorage.getItem("weightPreset")) {
            presetSelect.value = "flaggy";
            customWeightsDiv.style.display = "none";
          }
        } else {
          hintElem.innerText = "(all slots unlocked)";
          hintElem.style.color = "#90ee90";
        }

        openCogTab();
      }
      
      function fetchAndLoadConfig(username) {
        console.log("Trying to fetch", username);
        if (username.length > 0) {
          const headers = {
            "Content-Type": "text/json",
            method: "GET"
          };
          fetch(`https://cdn.idleonefficiency.com/profiles/${username.toLowerCase()}.json`, headers)
          .then((response) => {
            return response.json();
          }).then((json) => {
            load(json);
          }).catch((reason) => {
            console.log(reason);
          });
        }
      }

      document.getElementById("load").addEventListener("click", () => {
        const input = document.getElementById("input").value;
        try {
          const save = JSON.parse(input);
          load(save);
        } catch (e) {
          if (e instanceof SyntaxError) {
            fetchAndLoadConfig(input);
          }
        }
      });
      
      let optimalSteps = undefined;

      function stepsChangeHandler(ev) {
        const clone = cogInvetory.clone();
        for (let i = 0; i < ev.page; i++) {
          const step = optimalSteps[i];
          clone.move(step.keyFrom, step.keyTo );
        }

        const currentStep = optimalSteps[ev.page];
        const pos1 = currentStep.cog.position(currentStep.keyFrom);
        const pos2 = currentStep.targetCog.position(currentStep.keyTo);

        // TODO Paddy: clone is now in the state _before_ the move, that should be displayed with the 2 positions highlighted.
        f.printBoard(clone.board);
        window.boardRenderer.move(pos1, pos2);

        if (pos1.location == "spare" || pos2.location == "spare") {
          let pos = pos1;
          if (pos2.location == "spare") {
            pos = pos2;
          }
          const page = window.spareRenderer.getPage(pos);
          if (page != -1) {
            sparePage.goto(page);
          }
        }

        window.spareRenderer.move(pos1, pos2);
        
        // Animation
        const renderer = {
          [window.boardRenderer._type]: window.boardRenderer,
          [window.spareRenderer._type]: window.spareRenderer
        };

        const pos1Slot = renderer[pos1.location].get(pos1.y, pos1.x);
        const pos2Slot = renderer[pos2.location].get(pos2.y, pos2.x);

        if (pos1Slot.item && pos1Slot.item.icon !== "Blank" && pos1Slot.elem.childNodes.length === 1) {
          const from = pos1Slot.elem.childNodes[0];
          animateSwitchFrom(from, pos2Slot.elem.getBoundingClientRect());
        }
        if (pos2Slot.item && pos2Slot.item.icon !== "Blank" && pos2Slot.elem.childNodes.length === 1) {
          const to = pos2Slot.elem.childNodes[0];
          animateSwitchTo(to, pos1Slot.elem.getBoundingClientRect());
        }
      }

      // Run solver with current weights for the given number of iterations
      async function runSolveIterations(inventory, solveTime, iterations, statusFn) {
        const playerCount = inventory.playerCount || 10;
        const flagCount = Math.max(inventory.flagPose.length, 1);
        let best = null;
        let bestScore = -Infinity;
        for (let i = 0; i < iterations; i++) {
          if (statusFn) statusFn(i, iterations);
          await yield();
          g.best = null;
          const candidate = await solver.solve(inventory, solveTime);
          const score = solver.getScoreSum(candidate.score, playerCount, flagCount);
          console.log(`Iteration ${i + 1}/${iterations}: score ${score}`);
          if (score > bestScore) {
            bestScore = score;
            best = candidate;
          }
        }
        return best;
      }

      document.getElementById("solve").onclick = async () => {
        const solveTime = getInput("solveTime") || 2500;
        const iterations = getInput("solveIterations") || 3;
        const solveTextElem = document.getElementById("solvetext");
        const preset = document.getElementById("weightPreset").value;

        // Save settings
        const priorities = getWeightPriorities();
        localStorage.setItem("solveTime", solveTime);
        localStorage.setItem("solveIterations", iterations);
        localStorage.setItem("weightPreset", preset);
        localStorage.setItem("buildRate", priorities.buildRate);
        localStorage.setItem("expBonus", priorities.expBonus);
        localStorage.setItem("flaggy", priorities.flaggy);

        solveTextElem.innerText = "Optimizing...";
        document.getElementById("steps").innerHTML = "";
        await yield(); // Yield for DOM-Refresh

        console.log("Starting");

        let start = cogInvetory.clone();
        const originalScore = window.originalCogInventory.score;
        document.getElementById("start").innerText = `Starting BuildRate: ${mmoifyNumber(originalScore.buildRate, false)}/HR, EXP: ${mmoifyNumber(originalScore.expBonus, false)}%, Flaggy: ${mmoifyNumber(originalScore.flaggy, false)}/HR`;

        const playerCount = cogInvetory.playerCount || 10;
        const flagCount = Math.max(cogInvetory.flagPose.length, 1);
        let best;

        document.getElementById("balanced-details").innerHTML = "";
        document.getElementById("end").innerText = "";

        if (preset === "balanced") {
          // Phase 1: Find individual bests for each stat
          const statNames = ["buildRate", "expBonus", "flaggy"];
          const statLabels = ["Build Rate", "XP Bonus", "Flaggy"];
          const statUnits = ["/HR", "%", "/HR"];
          const individualBests = {};
          const noFlags = cogInvetory.flagPose.length === 0;
          const detailsDiv = document.getElementById("balanced-details");

          for (let s = 0; s < statNames.length; s++) {
            const stat = statNames[s];
            if (stat === "flaggy" && noFlags) {
              individualBests[stat] = 0;
              const p = document.createElement("p");
              p.innerText = `Best ${statLabels[s]}: skipped (no flags)`;
              detailsDiv.appendChild(p);
              continue;
            }
            solveTextElem.innerText = `Finding best ${statLabels[s]}...`;
            await yield();
            // Use raw weights (not normalized) so the solver's temperature scaling works
            const w = { buildRate: 0, expBonus: 0, flaggy: 0 };
            w[stat] = 1;
            solver.setWeights(w.buildRate, w.expBonus, w.flaggy);
            const result = await runSolveIterations(cogInvetory, solveTime, iterations, (i, n) => {
              solveTextElem.innerText = `Finding best ${statLabels[s]}... (${i + 1}/${n})`;
            });
            individualBests[stat] = result.score[stat];
            console.log(`Best ${stat}: ${individualBests[stat]}`);
            const p = document.createElement("p");
            p.innerText = `Best ${statLabels[s]}: ${mmoifyNumber(individualBests[stat], false)}${statUnits[s]}`;
            detailsDiv.appendChild(p);
          }

          // Phase 2: Solve with targets at 90% of individual bests
          const TARGET_PCT = 0.9;
          const targets = {
            buildRate: individualBests.buildRate * TARGET_PCT,
            expBonus: individualBests.expBonus * TARGET_PCT * (start.score.expBoost + playerCount) / playerCount,
            flaggy: (noFlags ? 0 : individualBests.flaggy * TARGET_PCT) * (start.score.flagBoost + flagCount) / flagCount
          };
          console.log("Individual bests:", individualBests);
          console.log("Targets (90%):", targets);

          solveTextElem.innerText = "Finding balanced solution...";
          await yield();
          solver.setWeights(1, 1, 1);
          solver.setTargets(targets);
          best = await runSolveIterations(cogInvetory, solveTime, iterations, (i, n) => {
            solveTextElem.innerText = `Finding balanced solution... (${i + 1}/${n})`;
          });
          solver.setTargets(null);

          // Report threshold hits
          const pctBr = individualBests.buildRate > 0 ? (best.score.buildRate / individualBests.buildRate * 100).toFixed(0) : 100;
          const pctXp = individualBests.expBonus > 0 ? (best.score.expBonus / individualBests.expBonus * 100).toFixed(0) : 100;
          const pctFl = individualBests.flaggy > 0 ? (best.score.flaggy / individualBests.flaggy * 100).toFixed(0) : 100;
          console.log(`Balanced result: BR ${pctBr}%, XP ${pctXp}%, FL ${pctFl}% of individual bests`);
          document.getElementById("end").innerText = `Balanced: ${mmoifyNumber(best.score.buildRate, false)}/HR (${pctBr}%), ${mmoifyNumber(best.score.expBonus, false)}% (${pctXp}%), ${mmoifyNumber(best.score.flaggy, false)}/HR (${pctFl}%)`;
        } else {
          // Standard weighted solve
          const weights = prioritiesToWeights(priorities, start.score, playerCount, flagCount);
          solver.setWeights(weights.buildRate, weights.expBonus, weights.flaggy);
          best = await runSolveIterations(cogInvetory, solveTime, iterations, (i, n) => {
            solveTextElem.innerText = `Optimizing... (${i + 1}/${n})`;
          });
          document.getElementById("end").innerText = `Final BuildRate: ${mmoifyNumber(best.score.buildRate, false)}/HR, EXP: ${mmoifyNumber(best.score.expBonus, false)}%, Flaggy: ${mmoifyNumber(best.score.flaggy, false)}/HR`;
        }

        const xpMult = cogInvetory.tinyMultipliers ? cogInvetory.tinyMultipliers.expBonus : 1;
        const brDelta = best.score.buildRate - originalScore.buildRate;
        const xpDelta = (best.score.expBonus - originalScore.expBonus) * xpMult;
        const flDelta = best.score.flaggy - originalScore.flaggy;
        const brSign = brDelta >= 0 ? "+" : "";
        const xpSign = xpDelta >= 0 ? "+" : "";
        const flSign = flDelta >= 0 ? "+" : "";
        document.getElementById("buildrate").innerText = `${mmoifyNumber(best.score.buildRate, false)}/HR (${brSign}${mmoifyNumber(brDelta)})`;
        document.getElementById("xpbonus").innerText = `${mmoifyNumber(best.score.expBonus * xpMult, false)}% (${xpSign}${mmoifyNumber(xpDelta)})`;
        document.getElementById("flaggyrate").innerText = `${mmoifyNumber(best.score.flaggy, false)}/HR (${flSign}${mmoifyNumber(flDelta)})`;

        optimalSteps = f.getOptimalSteps(best.board, best.cogs);
        f.printOptimalSteps(optimalSteps);
        if (document.getElementById("showSolved").checked) {
          // Show solved board
          f.printBoard(best.board);
          stepsPage.reset(optimalSteps.length, optimalSteps.length - 1);
        } else {
          f.printBoard(start.board);
          stepsPage.reset(optimalSteps.length, 0);
        }

        // Update cogInvetory to solved state so re-solving is stable
        window.cogInvetory = best;
        for (const cog of Object.values(cogInvetory.cogs)) {
          cog.initialKey = cog.key;
        }
        g.best = null;

        solveTextElem.innerText = "Solve";
        openCogTab();
      };
    
      function openCogTab() {
        document.getElementById("loader").style.display = "none";
        document.getElementById("result").style.display = "inherit";

        document.getElementById("loaderbtn").className = "";
        document.getElementById("cogbtn").className = "active";
      }

      function openLoaderTab() {
        document.getElementById("loader").style.display = "inherit";
        document.getElementById("result").style.display = "none";

        document.getElementById("loaderbtn").className = "active";
        document.getElementById("cogbtn").className = "";
      }

      document.getElementById("loaderbtn").addEventListener("click", () => {
        openLoaderTab();
      });
      document.getElementById("cogbtn").addEventListener("click", () => {
        openCogTab();
      });
    </script>
  </body>
</html>
